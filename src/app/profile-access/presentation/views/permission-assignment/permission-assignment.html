<mat-card>
  <mat-card-header>
    <mat-card-title>{{ 'alert.title' | translate }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    @if (store.isLoading) {
      <p>{{ 'common.loading' | translate }}</p>
    }
    @if (!store.isLoading) {
      <table mat-table [dataSource]="permissions">
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>{{ 'common.name' | translate }}</th>
          <td mat-cell *matCellDef="let permission">{{ permission.getCategory() }}</td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>{{ 'common.description' | translate }}</th>
          <td mat-cell *matCellDef="let permission">{{ permission.getDescription() }}</td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    }
  </mat-card-content>
</mat-card>
