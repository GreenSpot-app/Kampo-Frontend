<mat-card>
  <mat-card-header>
    <mat-card-title>{{ 'employee.role' | translate }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    @if (store.isLoading) {
      <p>{{ 'common.loading' | translate }}</p>
    }
    @if (!store.isLoading) {
      <table mat-table [dataSource]="roles">
        <ng-container matColumnDef="position">
          <th mat-header-cell *matHeaderCellDef>{{ 'employee.role' | translate }}</th>
          <td mat-cell *matCellDef="let role">{{ role.getPosition() }}</td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>{{ 'common.description' | translate }}</th>
          <td mat-cell *matCellDef="let role">{{ role.getDescription() }}</td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    }
  </mat-card-content>
</mat-card>
