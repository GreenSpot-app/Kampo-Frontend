<div class="container mat-elevation-z8">
  <div class="header">
    <h2>Temporadas (campo {{ fieldId }})</h2>
    <button mat-raised-button color="primary" (click)="navigateToNew()">
      <mat-icon>add</mat-icon> Nueva temporada
    </button>
  </div>

  <table mat-table [dataSource]="store.seasonTableData()">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let row">{{ row.id }}</td>
    </ng-container>

    <ng-container matColumnDef="fieldId">
      <th mat-header-cell *matHeaderCellDef>Campo</th>
      <td mat-cell *matCellDef="let row">{{ row.fieldId }}</td>
    </ng-container>

    <ng-container matColumnDef="cropName">
      <th mat-header-cell *matHeaderCellDef>Cultivo</th>
      <td mat-cell *matCellDef="let row">{{ row.cropName }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">{{ row.status }}</td>
    </ng-container>

    <ng-container matColumnDef="startedAt">
      <th mat-header-cell *matHeaderCellDef>Inicio</th>
      <td mat-cell *matCellDef="let row">{{ row.startedAt | date: 'shortDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button color="accent" (click)="view(row.id)" title="Ver">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button color="primary" (click)="edit(row.id)" title="Editar">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
</div>
