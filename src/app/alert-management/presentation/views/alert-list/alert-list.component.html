@if (isLoading) {
  <mat-spinner></mat-spinner>
} @else {
  <table mat-table [dataSource]="alerts">
    <ng-container matColumnDef="message">
      <th mat-header-cell *matHeaderCellDef>Message</th>
      <td mat-cell *matCellDef="let alert">{{ alert.getMessage() }}</td>
    </ng-container>

    <ng-container matColumnDef="priority">
      <th mat-header-cell *matHeaderCellDef>Priority</th>
      <td mat-cell *matCellDef="let alert">
        <mat-chip>{{ alert.getPriority() }}</mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let alert">
        {{ alert.getIsRead() ? 'Read' : 'Unread' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let alert">
        <button mat-button color="primary" (click)="onSelect(alert.getId())">
          View
        </button>
        @if (!alert.getIsRead()) {
          <button mat-button color="accent" (click)="onMarkRead(alert.getId())">
            Mark Read
          </button>
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
}
